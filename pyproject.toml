[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    env
  | .git
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["api", "app", "ingestion", "ml", "nlp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
